{% extends 'base.html' %}

{% block styles %}
{{ super() }}
<style>
/* ========================================
   MOBILE LAYOUT - DETECTADO PELO BACKEND
======================================= */

:root {
    /* Mobile-optimized variables */
    --mobile-header-height: 56px;
    --mobile-padding: 12px;
    --mobile-margin: 8px;
    --mobile-font-size: 14px;
    --mobile-line-height: 1.4;
}

/* Header Mobile Otimizado */
.app-header {
    height: var(--mobile-header-height) !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    background: var(--bg-glass) !important;
    backdrop-filter: blur(20px) !important;
    border-bottom: 1px solid var(--border-glass) !important;
    z-index: 1000 !important;
    box-shadow: var(--shadow-sm) !important;
}

.header-container {
    height: 100% !important;
    padding: 0 16px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
}

/* Logo Mobile */
.app-logo {
    font-size: 1.2rem !important;
    gap: 8px !important;
}

.app-logo .logo-icon {
    width: 28px !important;
    height: 28px !important;
    font-size: 0.8rem !important;
}

.app-logo .logo-text {
    font-size: 1.1rem !important;
    font-weight: 700 !important;
}

/* Menu Hamburger Mobile */
.mobile-menu-btn {
    display: flex !important;
    width: 44px !important;
    height: 44px !important;
    background: #007bff !important;
    border: 2px solid white !important;
    border-radius: 10px !important;
    color: white !important;
    cursor: pointer !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 3px !important;
    z-index: 1001 !important;
    transition: all 0.2s ease !important;
}

.mobile-menu-btn:hover {
    background: #0056b3 !important;
    transform: scale(1.05) !important;
}

.mobile-menu-btn .hamburger-line {
    width: 18px !important;
    height: 2px !important;
    background: white !important;
    border-radius: 1px !important;
    transition: all 0.3s ease !important;
    margin: 1px 0 !important;
}

.mobile-menu-btn.active .hamburger-line:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px) !important;
}

.mobile-menu-btn.active .hamburger-line:nth-child(2) {
    opacity: 0 !important;
}

.mobile-menu-btn.active .hamburger-line:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -6px) !important;
}

/* Esconder navegação desktop */
.header-nav,
.header-search,
.header-actions .header-btn,
.header-right {
    display: none !important;
}

/* Menu Lateral Mobile */
.mobile-nav {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 280px !important;
    height: 100vh !important;
    background: #ffffff !important;
    border-right: 2px solid #007bff !important;
    box-shadow: 2px 0 20px rgba(0,0,0,0.2) !important;
    transform: translateX(-100%) !important;
    transition: transform 0.3s ease !important;
    z-index: 1000 !important;
    display: flex !important;
    flex-direction: column !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
}

.mobile-nav.show {
    transform: translateX(0) !important;
}

/* Header do Menu Mobile */
.mobile-nav-header {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 16px 20px !important;
    border-bottom: 2px solid #f0f0f0 !important;
    background: #f8f9fa !important;
    flex-shrink: 0 !important;
}

.mobile-nav-logo {
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
}

.mobile-nav-logo .logo-icon {
    width: 32px !important;
    height: 32px !important;
    background: linear-gradient(135deg, #007bff, #0056b3) !important;
    border-radius: 6px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: white !important;
    font-weight: bold !important;
    font-size: 0.9rem !important;
}

.mobile-nav-logo .logo-text {
    font-weight: bold !important;
    font-size: 1.1rem !important;
    color: #333 !important;
}

.mobile-nav-close {
    width: 36px !important;
    height: 36px !important;
    background: #e9ecef !important;
    border: none !important;
    border-radius: 6px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    cursor: pointer !important;
    color: #666 !important;
    font-size: 1.1rem !important;
    transition: background 0.2s ease !important;
}

.mobile-nav-close:hover {
    background: #dee2e6 !important;
}

/* Conteúdo do Menu */
.mobile-nav-content {
    flex: 1 !important;
    overflow-y: auto !important;
    padding: 0 !important;
}

/* Seções do Menu */
.mobile-nav-section {
    border-bottom: 1px solid #e9ecef !important;
}

.mobile-nav-section:last-child {
    border-bottom: none !important;
}

.mobile-nav-title {
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    padding: 14px 20px !important;
    font-size: 0.9rem !important;
    font-weight: bold !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    color: #666 !important;
    background: #f8f9fa !important;
    border-bottom: 1px solid #e9ecef !important;
}

.mobile-nav-title i {
    color: #007bff !important;
    font-size: 1rem !important;
}

/* Links do Menu */
.mobile-nav-item {
    display: block !important;
    padding: 12px 20px !important;
    color: #333 !important;
    text-decoration: none !important;
    border-bottom: 1px solid #f0f0f0 !important;
    transition: all 0.2s ease !important;
    font-weight: 500 !important;
    font-size: 0.9rem !important;
    position: relative !important;
}

.mobile-nav-item:last-child {
    border-bottom: none !important;
}

.mobile-nav-item::before {
    content: '' !important;
    position: absolute !important;
    left: 0 !important;
    top: 0 !important;
    width: 3px !important;
    height: 100% !important;
    background: #007bff !important;
    transform: scaleY(0) !important;
    transition: transform 0.2s ease !important;
}

.mobile-nav-item:hover::before,
.mobile-nav-item:focus::before {
    transform: scaleY(1) !important;
}

.mobile-nav-item:hover,
.mobile-nav-item:focus {
    background: #f8f9fa !important;
    color: #007bff !important;
    padding-left: 25px !important;
}

.mobile-nav-item:active {
    background: #e9ecef !important;
    transform: scale(0.98) !important;
}

.mobile-nav-item i {
    margin-right: 12px !important;
    color: #007bff !important;
    width: 16px !important;
    text-align: center !important;
    font-size: 1rem !important;
}

/* Footer do Menu */
.mobile-nav-footer {
    border-top: 1px solid #e9ecef !important;
    background: #f8f9fa !important;
    padding: 16px 20px !important;
    flex-shrink: 0 !important;
}

.theme-toggle-mobile {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    background: white !important;
    border: 1px solid #ddd !important;
    border-radius: 6px !important;
    padding: 10px 12px !important;
    cursor: pointer !important;
    transition: all 0.2s ease !important;
    font-size: 0.85rem !important;
    color: #333 !important;
    width: 100% !important;
    justify-content: center !important;
}

.theme-toggle-mobile:hover {
    background: #007bff !important;
    color: white !important;
    border-color: #007bff !important;
}

.theme-toggle-mobile i {
    font-size: 0.9rem !important;
}

.mobile-nav-version {
    margin-top: 8px !important;
    color: #888 !important;
    font-size: 0.75rem !important;
    text-align: center !important;
}

/* Main Content Mobile */
.app-main {
    margin-top: var(--mobile-header-height) !important;
    padding: var(--mobile-padding) !important;
    min-height: calc(100vh - var(--mobile-header-height)) !important;
}

/* Container de conteúdo */
.container {
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
}

/* Body lock quando menu está aberto */
body.mobile-nav-open {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
    height: 100% !important;
}

/* Footer Mobile */
.app-footer {
    padding: 16px var(--mobile-padding) !important;
    margin-top: 32px !important;
    text-align: center !important;
    font-size: 0.8rem !important;
}

/* Animações de entrada */
@keyframes slideInMobile {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.mobile-nav-section {
    animation: slideInMobile 0.3s ease forwards !important;
}

.mobile-nav-section:nth-child(1) { animation-delay: 0.1s !important; }
.mobile-nav-section:nth-child(2) { animation-delay: 0.2s !important; }
.mobile-nav-section:nth-child(3) { animation-delay: 0.3s !important; }
.mobile-nav-section:nth-child(4) { animation-delay: 0.4s !important; }
</style>
{% endblock %}

{% block content %}
<!-- Mobile Menu Toggle Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Declarar variáveis no escopo global primeiro
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileNav = document.getElementById('mobileNav');
    const themeToggleMobile = document.getElementById('themeToggleMobile');

    // Declarar funções primeiro
    function openMobileMenu() {
        if (mobileNav) {
            mobileNav.classList.add('show');
            if (mobileMenuBtn) mobileMenuBtn.classList.add('active');
            document.body.classList.add('mobile-nav-open');
        }
    }

    function closeMobileMenu() {
        if (mobileNav) {
            mobileNav.classList.remove('show');
            if (mobileMenuBtn) mobileMenuBtn.classList.remove('active');
            document.body.classList.remove('mobile-nav-open');
        }
    }

    function updateThemeIcons(theme) {
        // Atualizar ícone desktop
        const themeIcon = document.getElementById('themeToggle')?.querySelector('i');
        if (themeIcon) {
            themeIcon.className = theme === 'light' ? 'bi bi-moon-stars' : 'bi bi-sun';
        }

        // Atualizar ícone mobile
        const mobileIcon = themeToggleMobile?.querySelector('i');
        if (mobileIcon) {
            mobileIcon.className = theme === 'light' ? 'bi bi-moon-stars' : 'bi bi-sun';
        }
    }

    // Agora fazer as verificações condicionais
    if (mobileMenuBtn && mobileNav) {
        mobileMenuBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            const isOpen = mobileNav.classList.contains('show');

            if (isOpen) {
                closeMobileMenu();
            } else {
                openMobileMenu();
            }
        });

        // Touch events para mobile
        mobileMenuBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
        });

        mobileMenuBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            const clickEvent = new Event('click');
            mobileMenuBtn.dispatchEvent(clickEvent);
        });
    }

    // Tema mobile
    if (themeToggleMobile) {
        themeToggleMobile.addEventListener('click', function() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            updateThemeIcons(newTheme);
        });
    }

    // Resize handler
    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            closeMobileMenu();
        }
    });
});
</script>

{% endblock %}
