<!-- Versão alternativa: Menu que desliza por cima -->
<style>

    color: white;

}

    box-shadow: var(--shadow-lg);
    z-index: 1500;

}

.slide-menu.open {
    left: 0;
}

.slide-menu-header {
    padding: 2rem 1.5rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.slide-menu-items {
    padding: 1rem 0;
}

    align-items: center;
    gap: 1rem;

    transition: var(--transition);
    border-left: 4px solid transparent;
}

    background: var(--primary);
