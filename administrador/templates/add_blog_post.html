{% extends 'base.html' %}

{% block title %}Adicionar Post - Admin{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 fw-bold">📝 Novo Post do Blog</h1>
                <a href="{{ url_for('administrador.content_manager') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Voltar
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="title" class="form-label fw-semibold">Título *</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            <div class="col-md-4">
                                <label for="category" class="form-label fw-semibold">Categoria *</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="">Selecione...</option>
                                    <option value="QR Code">QR Code</option>
                                    <option value="Imagens">Imagens</option>
                                    <option value="IA & Automação">IA & Automação</option>
                                    <option value="Dicas">Dicas</option>
                                    <option value="Tutoriais">Tutoriais</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="date" class="form-label fw-semibold">Data *</label>
                                <input type="date" class="form-control" id="date" name="date" required>
                            </div>
                            <div class="col-md-3">
                                <label for="reading_time" class="form-label fw-semibold">Tempo de Leitura</label>
                                <input type="text" class="form-control" id="reading_time" name="reading_time" 
                                       placeholder="3 min" value="3 min">
                            </div>
                            <div class="col-md-3">
                                <label for="views" class="form-label fw-semibold">Visualizações</label>
                                <input type="number" class="form-control" id="views" name="views" value="0" min="0">
                            </div>
                            <div class="col-12">
                                <label for="content" class="form-label fw-semibold">Conteúdo Principal *</label>
                                <textarea class="form-control" id="content" name="content" rows="4" required
                                          placeholder="Texto principal do post que aparecerá na home..."></textarea>
                            </div>
                            <div class="col-12">
                                <label for="tip" class="form-label fw-semibold">Dica Destacada</label>
                                <textarea class="form-control" id="tip" name="tip" rows="2"
                                          placeholder="Dica especial que será destacada no post (opcional)"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="cta_text" class="form-label fw-semibold">Texto do Botão</label>
                                <input type="text" class="form-control" id="cta_text" name="cta_text" 
                                       placeholder="Criar QR Code Agora">
                            </div>
                            <div class="col-md-6">
                                <label for="cta_link" class="form-label fw-semibold">Link do Botão</label>
                                <input type="text" class="form-control" id="cta_link" name="cta_link" 
                                       placeholder="/gerador-de-qr-code">
                            </div>
                            <div class="col-md-6">
                                <label for="location" class="form-label fw-semibold">Onde Exibir *</label>
                                <select class="form-select" id="location" name="location" required>
                                    <option value="home">Home (Página Principal)</option>
                                    <option value="ia-hub">IA Hub</option>
                                    <option value="both">Ambos</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="active" name="active" checked>
                                    <label class="form-check-label fw-semibold" for="active">
                                        Post Ativo
                                    </label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Salvar Post
                            </button>
                            <a href="{{ url_for('administrador.content_manager') }}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Definir data atual como padrão
document.getElementById('date').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
