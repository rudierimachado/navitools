{% extends 'base.html' %}

{% block title %}Adicionar Post IA - Admin{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 fw-bold">🤖 Novo Post de IA</h1>
                <a href="{{ url_for('administrador.content_manager') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Voltar
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="title" class="form-label fw-semibold">Título *</label>
                                <input type="text" class="form-control" id="title" name="title" required
                                       placeholder="GPT-4 Turbo: 50% Mais Rápido">
                            </div>
                            <div class="col-md-6">
                                <label for="category" class="form-label fw-semibold">Categoria *</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="">Selecione...</option>
                                    <option value="ChatGPT">ChatGPT</option>
                                    <option value="Claude">Claude</option>
                                    <option value="Gemini">Gemini</option>
                                    <option value="Midjourney">Midjourney</option>
                                    <option value="Copilot">Copilot</option>
                                    <option value="Perplexity">Perplexity</option>
                                    <option value="Outros">Outros</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="badge_color" class="form-label fw-semibold">Cor do Badge *</label>
                                <select class="form-select" id="badge_color" name="badge_color" required>
                                    <option value="success">Verde (Success)</option>
                                    <option value="info">Azul (Info)</option>
                                    <option value="primary">Azul Escuro (Primary)</option>
                                    <option value="warning">Amarelo (Warning)</option>
                                    <option value="danger">Vermelho (Danger)</option>
                                    <option value="secondary">Cinza (Secondary)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="date" class="form-label fw-semibold">Data *</label>
                                <input type="date" class="form-control" id="date" name="date" required>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="active" name="active" checked>
                                    <label class="form-check-label fw-semibold" for="active">
                                        Post Ativo
                                    </label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="summary" class="form-label fw-semibold">Resumo *</label>
                                <textarea class="form-control" id="summary" name="summary" rows="3" required
                                          placeholder="OpenAI lança versão otimizada com menor latência..."></textarea>
                                <div class="form-text">Texto curto que aparecerá no card do IA Hub</div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-robot me-1"></i>Salvar Post IA
                            </button>
                            <a href="{{ url_for('administrador.content_manager') }}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Preview -->
            <div class="card border-0 shadow-sm mt-4">
                <div class="card-header bg-dark text-white">
                    <h6 class="mb-0">👀 Preview do Card</h6>
                </div>
                <div class="card-body bg-dark text-white">
                    <div id="preview-card" class="ai-post-item p-2 rounded bg-white bg-opacity-10">
                        <div class="d-flex align-items-start">
                            <span id="preview-badge" class="badge bg-success me-2 mt-1">Categoria</span>
                            <div class="flex-grow-1">
                                <p id="preview-title" class="small fw-semibold mb-1">Título do Post</p>
                                <p id="preview-summary" class="small opacity-75 mb-0">Resumo do post...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Definir data atual como padrão
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Preview em tempo real
function updatePreview() {
    const title = document.getElementById('title').value || 'Título do Post';
    const category = document.getElementById('category').value || 'Categoria';
    const badgeColor = document.getElementById('badge_color').value || 'success';
    const summary = document.getElementById('summary').value || 'Resumo do post...';
    
    document.getElementById('preview-title').textContent = title;
    document.getElementById('preview-badge').textContent = category;
    document.getElementById('preview-badge').className = `badge bg-${badgeColor} me-2 mt-1`;
    document.getElementById('preview-summary').textContent = summary;
}

// Atualizar preview quando campos mudarem
document.getElementById('title').addEventListener('input', updatePreview);
document.getElementById('category').addEventListener('change', updatePreview);
document.getElementById('badge_color').addEventListener('change', updatePreview);
document.getElementById('summary').addEventListener('input', updatePreview);
</script>
{% endblock %}
